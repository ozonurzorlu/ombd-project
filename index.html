<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMDB Film Arama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .movie-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .movie-poster { 
            width: 100%;
            height: 450px; 
            object-fit: cover; 
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4 fw-bold text-primary">🎬 Film Arama Motoru</h1>

        <div class="card shadow-sm p-4 mb-4 border-0 rounded-4">
            <form id="searchForm" class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Film adı girin (Örn: Matrix)..." required>
                </div>
                <div class="col-md-3">
                    <select id="typeFilter" class="form-select form-select-lg">
                        <option value="">Tüm Türler</option>
                        <option value="movie">Film</option>
                        <option value="series">Dizi</option>
                        <option value="episode">Bölüm</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Ara</button>
                </div>
            </form>
        </div>

        <div id="errorMessage" class="alert alert-danger d-none shadow-sm rounded-3" role="alert"></div>

        <div id="loadingSpinner" class="text-center d-none my-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
        </div>

        <div id="movieResults" class="row justify-content-center">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
